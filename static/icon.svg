<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background, rounded -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Llama-ish glyph in the middle -->
  <g transform="translate(256 256)">
    <circle cx="0" cy="0" r="170" fill="#ffffff"/>
    <!-- Ears -->
    <ellipse cx="-72" cy="-150" rx="22" ry="44" fill="#ffffff" stroke="#0a0a0a" stroke-width="6" transform="rotate(-12 -72 -150)"/>
    <ellipse cx="72" cy="-150" rx="22" ry="44" fill="#ffffff" stroke="#0a0a0a" stroke-width="6" transform="rotate(12 72 -150)"/>
    <!-- Head -->
    <ellipse cx="0" cy="20" rx="120" ry="140" fill="#ffffff" stroke="#0a0a0a" stroke-width="8"/>
    <!-- Eyes -->
    <circle cx="-44" cy="-10" r="14" fill="#0a0a0a"/>
    <circle cx="44" cy="-10" r="14" fill="#0a0a0a"/>
    <!-- Subtle smile -->
    <path d="M-24 60 Q0 76 24 60" fill="none" stroke="#0a0a0a" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
